# =============================================================================
#  IoT Camera System — Mosquitto MQTT Broker Configuration
#  Phien ban: 2.0 (Production-Ready with Authentication & ACL)
#  Ngay tao: 2026-02-28
# =============================================================================

# ========================= NETWORK =========================
# Listener chinh: TCP port 1883 cho tat ca interface
listener 1883 0.0.0.0

# Tat cho phep ket noi an danh (bat buoc dang nhap)
allow_anonymous false

# ========================= AUTHENTICATION =========================
# File chua danh sach tai khoan (username:password_hash)
password_file C:\Users\Minh\OneDrive\Mon_Chuyen_Nganh\Project1\IoT_Camera_System\Web_Server_Node\mqtt_credentials\passwd

# ========================= AUTHORIZATION (ACL) =========================
# File phan quyen topic cho tung tai khoan
acl_file C:\Users\Minh\OneDrive\Mon_Chuyen_Nganh\Project1\IoT_Camera_System\Web_Server_Node\mqtt_credentials\acl

# ========================= PERSISTENCE =========================
# Luu tru trang thai message retained va session khi broker restart
persistence true
persistence_location C:\Users\Minh\OneDrive\Mon_Chuyen_Nganh\Project1\IoT_Camera_System\Web_Server_Node\mqtt_data\

# Tu dong luu xuong dia cu moi 60 giay
autosave_interval 60

# ========================= LOGGING =========================
# Ghi log ra file (de phan tich va debug)
log_dest file C:\Users\Minh\OneDrive\Mon_Chuyen_Nganh\Project1\IoT_Camera_System\Web_Server_Node\mqtt_logs\mosquitto.log

# Dong thoi in ra console (de theo doi real-time)
log_dest stdout

# Muc do log: error, warning, notice, information, debug
log_type error
log_type warning
log_type notice
log_type information

# Ghi kem timestamp cho moi dong log
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Log ket noi/ngat ket noi cua client (rat huu ich khi debug ESP32)
connection_messages true

# ========================= PERFORMANCE & LIMITS =========================
# Gioi han kich thuoc message toi da (256KB - du cho anh JPEG nho)
message_size_limit 262144

# Thoi gian keepalive toi da (120 giay)
max_keepalive 120

# Gioi han so client ket noi dong thoi (10 thiet bi la du cho do an)
max_connections 10

# ========================= LAST WILL & TESTAMENT =========================
# Mosquitto tu dong xu ly LWT khi client mat ket noi dot ngot
# (Khong can cau hinh o day - LWT duoc set boi client khi connect)
